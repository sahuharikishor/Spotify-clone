    <div class="navbar">
        <nav class="nav">
            <div class="nav-icon">
                <img class="sicon" src="img/Spotify-Icon-Black-Logo.svg" alt="Spocify">

            <div class="search-container">

                <div class="divider"></div>

                <svg class="browse-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"

                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="9" y1="3" x2="9" y2="21"></line>
                </svg>

            </div>
            <div class="feature">
                <div class="links">
                    <span>Premium</span>
                    <span>Support</span>
                    <span>Download</span>
                </div>

                <div class="divider-2"></div>

                <div class="install">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                        <circle cx="12" cy="12" r="9" stroke="#b3b3b3" stroke-width="2" />
                        <path d="M12 8v6" stroke="#b3b3b3" stroke-width="2" stroke-linecap="round" />
                        <path d="M9.5 11.5L12 14l2.5-2.5" stroke="#b3b3b3" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />
                    </svg>
                    <span>Install App</span>
                </div>

                <div class="auth">
                    <span class="signup">Sign up</span>
                    <button class="login">Log in</button>
                </div>
            </div>
    </div>

    <div class="container flex ">
        <div class="left  bg-black rounded ">
            <div class="library">
                <div class="lheader">
                    <span>Your Library</span>
                    <button>
                        <!-- <span class="plus">&#43</span> -->
                        <svg width="16" height="16" viewBox="0 0 24 24" stroke="currentColor" fill="none"
                            stroke-width="2">
                            <line x1="12" y1="5" x2="12" y2="19" stroke-linecap="round" />
                            <line x1="5" y1="12" x2="19" y2="12" stroke-linecap="round" />
                        </svg>
                        <span>Create</span>
                    </button>
                </div>
                <div class="lbox">
                    <div class="playlist box">
                        <div class="h">
                            <h4>Create your first playlist</h4>
                            <p>It's easy we'll help you</p>   
                        </div>
                        <button class="lbut play_but">Create playlist</button>

                    </div>
                    <div class="podcast box">
                        <div class="h">
                            <h4>Let's find some podcasts to follow</h4>
                            <p>We'll keep you updated on new episodes</p>
                        </div>
                        <button class="lbut pod_but">Browse podcasts</button>

                    </div>
                </div>
            </div>
